spring.application.name=sap-hcm
server.port=${SERVER_PORT:8080}

# Mode demo fiable par defaut: H2 en memoire avec dialecte PostgreSQL.
# Pour PostgreSQL/MySQL, definir DB_URL, DB_DRIVER, DB_USERNAME, DB_PASSWORD.
spring.datasource.url=${DB_URL:jdbc:h2:mem:saphcm;MODE=PostgreSQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.sql.init.mode=never
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.jwt.secret=${JWT_SECRET:SAP_HCM_DEMO_SECRET_KEY_2026_CHANGE_ME_32_CHARS_MINIMUM}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080,http://localhost:5173,http://localhost:5555,http://localhost:5000,http://localhost:62755,http://127.0.0.1:62755}
